<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="140" rx="16" fill="url(#bgGrad)"/>

  <!-- Snowflake / Fan icon -->
  <g transform="translate(70,70)" filter="url(#glow)">
    <!-- Main cross arms -->
    <line x1="0" y1="-38" x2="0" y2="38" stroke="url(#iceGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-38" y1="0" x2="38" y2="0" stroke="url(#iceGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Diagonal arms -->
    <line x1="-27" y1="-27" x2="27" y2="27" stroke="url(#iceGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="27" y1="-27" x2="-27" y2="27" stroke="url(#iceGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Branch tips on main arms -->
    <line x1="0" y1="-38" x2="-10" y2="-28" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-38" x2="10" y2="-28" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="38" x2="-10" y2="28" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="38" x2="10" y2="28" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-38" y1="0" x2="-28" y2="-10" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-38" y1="0" x2="-28" y2="10" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="0" x2="28" y2="-10" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="0" x2="28" y2="10" stroke="url(#iceGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Mid branches -->
    <line x1="0" y1="-20" x2="-8" y2="-12" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="8" y2="-12" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="-8" y2="12" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="8" y2="12" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="-12" y2="-8" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="-12" y2="8" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="12" y2="-8" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="12" y2="8" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Centre dot -->
    <circle cx="0" cy="0" r="5" fill="url(#iceGrad)"/>
  </g>

  <!-- ICEWIND text -->
  <text x="122" y="68" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" letter-spacing="4" fill="#00d4ff" filter="url(#glow)">ICE</text>
  <text x="210" y="68" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" letter-spacing="4" fill="#ffffff">WIND</text>

  <!-- FAN text -->
  <text x="122" y="108" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" letter-spacing="12" fill="#ffffff">FAN</text>

  <!-- Tagline -->
  <text x="122" y="126" font-family="Arial, sans-serif" font-size="11" letter-spacing="3" fill="rgba(255,255,255,0.35)">UK'S #1 PORTABLE ICE FAN</text>
</svg>
